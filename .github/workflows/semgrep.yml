name: MediPortal Security Scan — Semgrep SAST

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  semgrep-sast:
    name: Static Analysis Security Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep — Python Security Rules
        run: |
          semgrep \
            --config p/python \
            --config p/flask \
            --config p/owasp-top-ten \
            --config p/secrets \
            --json \
            --output semgrep-results.json \
            . || true

      - name: Display Semgrep Results
        run: |
          echo "========================================="
          echo "  MEDIAPORTAL SEMGREP SCAN RESULTS"
          echo "========================================="
          semgrep \
            --config p/python \
            --config p/flask \
            --config p/owasp-top-ten \
            --config p/secrets \
            . || true

      - name: Upload Semgrep JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-results.json
          retention-days: 30

      - name: Run Semgrep — Fail on Critical Findings
        run: |
          semgrep \
            --config p/python \
            --config p/flask \
            --config p/owasp-top-ten \
            --config p/secrets \
            --severity ERROR \
            .