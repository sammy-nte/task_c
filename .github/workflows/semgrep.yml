name: MediPortal Security Scan — Semgrep SAST

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  semgrep-sast:
    name: Static Analysis Security Testing
    runs-on: ubuntu-latest

    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep CI — report to dashboard
        run: semgrep ci || true


      - name: Semgrep — print findings to Actions log
        run: |
          semgrep \
            --config p/python \
            --config p/flask \
            --config p/owasp-top-ten \
            --config p/secrets \
            . || true


      - name: Semgrep — save JSON report
        run: |
          semgrep \
            --config p/python \
            --config p/flask \
            --config p/owasp-top-ten \8w
            --config p/secrets \
            --json \
            --output semgrep-results.json \
            . || true

      - name: Upload JSON report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-results.json
          retention-days: 30
