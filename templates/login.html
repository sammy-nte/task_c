<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MediPortal — Login</title>
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
        body { 
            font-family: Arial, sans-serif;
            background: url("{{ url_for('static', filename='login-bg.jpg') }}");
            width: 100%;
            height: 100vh;
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container{
            width: 500px;
            background: rgba(41, 40, 40, 0.715);
            backdrop-filter: blur(7px);
            padding: 20px;
            border-radius: 20px;
        }
        .header-div { 
            color: white; 
            text-align: center; 
            font-weight: bold;
            font-size: 2rem; 
        }
        .p-type{ 
            font-weight: 100;
        }
        label { 
            display: block; 
            margin-top: 12px; 
            font-weight: bold; 
            color: white; 
        }
        input[type="text"], 
        input[type="password"] {
            width: 100%; 
            padding: 8px; 
            margin-top: 4px; 
            box-sizing: border-box;
            border: 1px solid #ccc; 
            border-radius: 4px;
        }
        form{
            width: 100%;
        }
        button { 
            display: block; 
            margin: 16px auto 0; 
            width: 150px; 
            background: white; 
            color: black; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            padding: 10px 0; 
        }
        button:hover { 
            background: #7c7e81a2; 
            color: white; 
        }
        .error { 
            color: #c0392b; 
            margin-top: 12px; 
        }
    </style>
    </head>
    <body>
        <section class="container">
            <div class="header-div">
                <span class="p-title">MediPortal</span> |
                <span class="p-type">Login</span>
            </div>

            <!-- vulnerability: Missing CSRF Protection, this form does not include a CSRF token.
            CWE: CWE-352 (Cross-Site Request Forgery) -->

            <form method="POST" action="/login">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                    autocomplete="username" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                    autocomplete="current-password" required>

                <button type="submit">Log In</button>
            </form>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}
        </section>

    </body>
</html>
